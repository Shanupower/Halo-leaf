# Production stack for a single EC2 instance (t3.medium or similar).
# Usage: see docs/ec2-deployment.md
# Isolated project name — does not affect other Docker stacks on the same host.

name: halo-leaf

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-medusa}
    volumes:
      - medusa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medusa} -d ${POSTGRES_DB:-medusa}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - medusa_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./deploy/ec2/.env
    environment:
      NODE_ENV: production
      PORT: "9000"
      DATABASE_URL: postgres://${POSTGRES_USER:-medusa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-medusa}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-9000}:9000"
    deploy:
      resources:
        limits:
          memory: 1536M

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-9001}:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./deploy/ec2/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ec2/nginx/locations.inc:/etc/nginx/conf.d/locations.inc:ro
      - ./deploy/ec2/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  medusa_pgdata:
  medusa_redis:
