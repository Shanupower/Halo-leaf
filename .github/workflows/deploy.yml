name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment to deploy
        required: true
        default: production

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra/aws
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}
      - run: npm install
      - run: npm run build
      - run: npm run deploy -- --require-approval never

  deploy-frontend:
    needs: deploy-infra
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_IMAGE_BASE_URL: ${{ vars.VITE_IMAGE_BASE_URL }}
          VITE_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.VITE_MEDUSA_PUBLISHABLE_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
      - run: aws s3 sync dist "s3://${{ vars.FRONTEND_BUCKET_NAME }}" --delete
      - run: aws cloudfront create-invalidation --distribution-id "${{ vars.FRONTEND_DISTRIBUTION_ID }}" --paths "/*"
