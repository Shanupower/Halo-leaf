# Halo Leaf — single-host production (storefront + Medusa API + Admin)
# TLS: mount certs at /etc/nginx/certs/fullchain.pem and privkey.pem (see docs/ec2-deployment.md)

upstream medusa_backend {
    server backend:9000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # Uncomment after certbot copies certs into deploy/ec2/nginx/certs/
    # return 301 https://$host$request_uri;

    location /health {
        proxy_pass http://medusa_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    include /etc/nginx/conf.d/locations.inc;
}

